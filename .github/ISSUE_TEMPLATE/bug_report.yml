name: Bug report
description: Reporta un problema reproducible en bcv-exchange-rate.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar. Completa la información para reproducir el problema rápido.
  - type: input
    id: version
    attributes:
      label: Versión de bcv-exchange-rate
      placeholder: "2.0.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Versión de Node.js
      placeholder: "20.11.0"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Idealmente un fragmento de código autocontenido.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Resultado observado
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs o stack trace
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: Revisé issues existentes y no encontré un duplicado.
          required: true
        - label: Si el error proviene del scraping, incluyo fecha y hora aproximada.
          required: false
